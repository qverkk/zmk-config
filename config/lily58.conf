# Uncomment to enable encoder
# CONFIG_EC11=y
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment the following line to enable the Lily58 OLED Display
# CONFIG_ZMK_DISPLAY=y

# Battery reporting - required by the battery report behavior
CONFIG_ZMK_BATTERY_REPORTING=y

# Fetch the right (peripheral) half battery level to the central (left) side
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Enable the custom battery report behavior (defined in app/)
CONFIG_ZMK_BATTERY_REPORT_BEHAVIOR=y
